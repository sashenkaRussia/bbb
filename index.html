<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BitMarket</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px;
            background-color: #333;
        }
        nav ul {
            list-style-type: none;
            margin: 0;
            padding: 0;
            display: flex;
        }
        nav li {
            margin-right: 10px;
        }
        a {
            text-decoration: none;
            color: #fff;
        }
        .main-section {
            text-align: center;
            padding: 20px;
        }
        h2 {
            font-size: 2em;
            margin-bottom: 20px;
        }
        .card {
            border: 1px solid #ccc;
            border-radius: 5px;
            overflow: hidden;
            width: 20%;
            margin: 10px;
            float: left;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        img {
            max-width: 100%;
            height: auto;
        }
        button {
            display: block;
            width: 100%;
            padding: 10px;
            background-color: #ffcc00;
            color: #333;
            border: none;
            cursor: pointer;
            transition: background-color 0.3s ease;
        }
        button:hover {
            background-color: #eeb300;
        }
        footer {
            clear: both;
            padding: 20px;
            background-color: #6600cc;
            text-align: center;
        }
        .footer-text {
            color: #fff;
        }
    </style>
</head>
<body>
    <div class="header">
        <img src="https://learn.algoritmika.org/uploads/2021/02/logo_0_1613588860.svg" alt="Logo" style="height: 50px;"> <!-- Логотип -->
        <nav>
            <ul>
                <li><a href="#">Каталог</a></li>
                <li><a href="#">Оптом</a></li>
                <li><a href="#">Доставка</a></li>
                <li><a href="#">Возврат товара</a></li>
                <li><a href="#" style="background-color:#00ccff;padding:5px;">Скидки</a></li>
            </ul>
        </nav>
    </div>
    
    <section class="main-section">
        <h2>Профессионалы советуют</h2>
        
        <div class="card">
            <img src="https://learn.algoritmika.org/uploads/2021/02/notebook-405755_1920_0_1613586011.jpg" alt="Laptop for rest">
            <p>Ноутбук для отдыха</p>
            <button>Samsung V145-S</button>
            <button style="background-color:#ff6600;">Подробнее</button>
        </div>
        
        <div class="card">
            <img src="https://learn.algoritmika.org/uploads/2021/02/music-1813100_1280_0_1613586010.png" alt="Headphones">
            <p>Выбираем наушники</p>
            <button>Поговорим о новинках</button>
            <button style="background-color:#00cc00;">Подробнее</button>
        </div>
        
        <div class="card">
            <img src="https://learn.algoritmika.org/uploads/2021/02/mobile-phone-1875813_1920_0_1613586011.jpg" alt="Phone of dreams">
            <p>Телефон мечты</p>
            <button>Apple iPhone 13</button>
            <button style="background-color:#ff6600;">Подробнее</button>
        </div>
        
        <div class="card">
            <img src="https://learn.algoritmika.org/uploads/2021/02/laptop-1483974_1920_0_1613586010.jpg" alt="Tech for everyone">
            <p>Техника для всего</p>
            <button>И целого мира мало...</button>
            <button style="background-color:#cc00cc;">Подробнее</button>
        </div>
    </section>
    
    <footer>
        <img src="img src="https://learn.algoritmika.org/uploads/2021/02/Group%201_0_1613586391.png" alt="VK Icon" style="height: 30px;"> <!-- VK иконка -->
        <span class="footer-text">Напиши — получи промокод!</span>
    </footer>
</body>
</html>
